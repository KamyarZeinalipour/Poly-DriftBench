# ============================================================
# Token Squeeze Hypothesis — Master Configuration
# ============================================================

project:
  name: "token-squeeze"
  seed: 42
  output_dir: "results"

# --- Languages ---
languages:
  baseline: "en"
  targets:
    - code: "it"
      name: "Italian"
      family: "Romance"
      deepl_code: "IT"
    - code: "es"
      name: "Spanish"
      family: "Romance"
      deepl_code: "ES"
    - code: "fr"
      name: "French"
      family: "Romance"
      deepl_code: "FR"
    - code: "de"
      name: "German"
      family: "Germanic"
      deepl_code: "DE"

# --- Models ---
# Using models cached at /home4/kamyar/italian_detox/hf_cache/hub/
models:
  - name: "llama-3.1-8b"
    hf_id: "meta-llama/Llama-3.1-8B-Instruct"
    attention_type: "grouped_query"
    context_window: 131072
  - name: "llama-3.2-3b"
    hf_id: "meta-llama/Llama-3.2-3B-Instruct"
    attention_type: "grouped_query"
    context_window: 131072
  - name: "llama-3.2-1b"
    hf_id: "meta-llama/Llama-3.2-1B-Instruct"
    attention_type: "grouped_query"
    context_window: 131072
  - name: "mistral-7b"
    hf_id: "mistralai/Mistral-7B-Instruct-v0.3"
    attention_type: "sliding_window"
    context_window: 32768
  - name: "mistral-nemo-12b"
    hf_id: "mistralai/Mistral-Nemo-Instruct-2407"
    attention_type: "sliding_window"
    context_window: 131072
  - name: "mistral-small-24b"
    hf_id: "mistralai/Mistral-Small-24B-Instruct-2501"
    attention_type: "sliding_window"
    context_window: 32768
  - name: "qwen2.5-3b"
    hf_id: "Qwen/Qwen2.5-3B-Instruct"
    attention_type: "grouped_query"
    context_window: 32768
  - name: "qwen2.5-7b"
    hf_id: "Qwen/Qwen2.5-7B-Instruct"
