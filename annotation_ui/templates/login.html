<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly-DriftBench — Annotator Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
            margin-bottom: 16px;
        }
        .login-card input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .login-card input::placeholder { color: #666; }
        .login-card button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .guide-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .guide-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔬 Poly-DriftBench</h1>
        <p class="subtitle">Human Evaluation — Conversation Quality</p>
        <form method="POST">
            <input type="text" name="name" placeholder="Enter your name" required autofocus>
            <button type="submit">Start Annotating</button>
        </form>
        <a href="/guidelines" class="guide-link">📖 Read Annotation Guidelines First</a>
    </div>
</body>
</html>
